{% extends 'base.html' %}

{% block content %}
<h2>{{ room.name }}</h2>
<p>Room Code: {{ room.code }}</p>

<hr>

<div id="chat-box" style="height: 300px; overflow-y: auto; border: 1px solid #ccc; padding: 10px;">
    {% for msg in messages %}
        <p><strong>{{ msg.user.username }}:</strong> {{ msg.content }}</p>
    {% endfor %}
</div>

<br>

<form id="chat-form">
    <input type="text" id="message-input" placeholder="Type a message..." required>
    <button type="submit">Send</button>
</form>

<script>
    const roomCode = "{{ room.code }}";
    const chatSocket = new WebSocket(

        'ws://' + window.location.hostname + ':8000/ws/chat/{{ room.code }}/'
);

    );

    chatSocket.onmessage = function(e) {
        const data = JSON.parse(e.data);
        const chatBox = document.getElementById('chat-box');
        chatBox.innerHTML += `<p><strong>${data.user}:</strong> ${data.message}</p>`;
        chatBox.scrollTop = chatBox.scrollHeight;  
    };

    chatSocket.onclose = function(e) {
        console.error('Chat socket closed.');
    };

    document.getElementById('chat-form').onsubmit = function(e) {
        e.preventDefault();
        const msgInput = document.getElementById('message-input');
        const message = msgInput.value;

        chatSocket.send(JSON.stringify({
            'message': message
        }));

        msgInput.value = '';
    };
</script>

{% endblock %}
